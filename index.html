<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王者荣耀赛后表现评估器</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 标题样式 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #e6b800;
            text-shadow: 0 0 10px rgba(230, 184, 0, 0.5);
            margin-bottom: 8px;
        }

        .header p {
            color: #8892b0;
            font-size: 14px;
        }

        /* 卡片容器 */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 18px;
            color: #e6b800;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(230, 184, 0, 0.3);
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccd6f6;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e6b800;
            background: rgba(255, 255, 255, 0.12);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        /* 评估按钮 */
        .btn-evaluate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e6b800 0%, #ff9500 100%);
            border: none;
            border-radius: 12px;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-evaluate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 184, 0, 0.4);
        }

        .btn-evaluate:active {
            transform: translateY(0);
        }

        /* 结果展示区域 */
        .result-container {
            display: none;
            margin-top: 20px;
        }

        .result-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 牌子展示 */
        .badge-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .badge-item {
            text-align: center;
            padding: 16px 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .badge-item.won {
            border-color: currentColor;
            box-shadow: 0 0 20px currentColor;
        }

        .badge-item .badge-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .badge-item .badge-name {
            font-size: 14px;
            font-weight: bold;
        }

        .badge-gold {
            color: #ffd700;
        }

        .badge-silver {
            color: #c0c0c0;
        }

        .badge-mvp {
            color: #00ff88;
        }

        /* 评分展示 */
        .score-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .score-main {
            text-align: center;
            margin-bottom: 20px;
        }

        .score-value {
            font-size: 64px;
            font-weight: bold;
            color: #e6b800;
            text-shadow: 0 0 20px rgba(230, 184, 0, 0.5);
        }

        .score-label {
            font-size: 18px;
            color: #8892b0;
        }

        .score-breakdown {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .score-item .label {
            color: #8892b0;
        }

        .score-item .value {
            font-weight: bold;
        }

        .score-item .value.high {
            color: #00ff88;
        }

        .score-item .value.medium {
            color: #e6b800;
        }

        .score-item .value.low {
            color: #ff6b6b;
        }

        /* MVP分析 */
        .mvp-analysis {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .mvp-analysis h3 {
            color: #00ff88;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .mvp-analysis p {
            color: #ccd6f6;
            line-height: 1.6;
            font-size: 14px;
        }

        .mvp-analysis .highlight {
            color: #e6b800;
            font-weight: bold;
        }

        /* 底部说明 */
        .footer {
            text-align: center;
            padding: 20px;
            color: #5a6a8a;
            font-size: 12px;
            line-height: 1.8;
        }

        /* 评估按钮禁用状态 */
        .btn-evaluate:disabled {
            background: #4a4a4a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题区域 -->
        <div class="header">
            <h1>🏆 王者荣耀赛后表现评估器</h1>
            <p>基于S37赛季评分机制 · 仅供参考娱乐</p>
        </div>

        <!-- 输入区域 -->
        <div class="card">
            <div class="card-title">📊 请输入你的赛后数据</div>

            <div class="form-group">
                <label>位置</label>
                <select id="position">
                    <option value="marksman">射手</option>
                    <option value="mage">法师</option>
                    <option value="tank">坦克/对抗路</option>
                    <option value="support">辅助</option>
                    <option value="jungler">打野</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>击杀 (K)</label>
                    <input type="number" id="kills" min="0" placeholder="0">
                </div>
                <div class="form-group">
                    <label>死亡 (D)</label>
                    <input type="number" id="deaths" min="0" placeholder="0">
                </div>
            </div>

            <div class="form-group">
                <label>助攻 (A)</label>
                <input type="number" id="assists" min="0" placeholder="0">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>输出伤害占比 (%)</label>
                    <input type="number" id="damageShare" min="0" max="100" step="0.1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>承受伤害占比 (%)</label>
                    <input type="number" id="damageTaken" min="0" max="100" step="0.1" placeholder="0">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>参团率 (%)</label>
                    <input type="number" id="teamFight" min="0" max="100" step="0.1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>经济占比 (%)</label>
                    <input type="number" id="goldShare" min="0" max="100" step="0.1" placeholder="0">
                </div>
            </div>

            <button class="btn-evaluate" id="evaluateBtn" onclick="evaluatePerformance()">
                🔍 开始评估
            </button>
        </div>

        <!-- 结果展示区域 -->
        <div class="result-container" id="resultContainer">
            <!-- 牌子展示 -->
            <div class="card">
                <div class="card-title">🎖️ 预估获得</div>
                <div class="badge-display">
                    <div class="badge-item badge-mvp" id="mvpBadge">
                        <div class="badge-icon">👑</div>
                        <div class="badge-name">MVP</div>
                    </div>
                    <div class="badge-item badge-gold" id="goldBadge">
                        <div class="badge-icon">🥇</div>
                        <div class="badge-name">金牌</div>
                    </div>
                    <div class="badge-item badge-silver" id="silverBadge">
                        <div class="badge-icon">🥈</div>
                        <div class="badge-name">银牌</div>
                    </div>
                </div>

                <!-- 主要评分 -->
                <div class="score-section">
                    <div class="score-main">
                        <div class="score-value" id="finalScore">0.0</div>
                        <div class="score-label">综合评分</div>
                    </div>
                    <div class="score-breakdown">
                        <div class="score-item">
                            <span class="label">MVP指数</span>
                            <span class="value" id="mvpIndex">0.0</span>
                        </div>
                        <div class="score-item">
                            <span class="label">金牌指数</span>
                            <span class="value" id="goldIndex">0.0</span>
                        </div>
                    </div>
                </div>

                <!-- MVP分析 -->
                <div class="mvp-analysis" id="mvpAnalysis">
                    <h3>📝 MVP差距分析</h3>
                    <p id="analysisText">分析中...</p>
                </div>
            </div>
        </div>

        <!-- 底部说明 -->
        <div class="footer">
            <p>⚠️ 本工具模拟的是S37赛季后的新评分机制（更侧重团队贡献）</p>
            <p>结果仅供娱乐参考，实际评分以游戏内为准</p>
        </div>
    </div>

    <script>
        // 评估函数 - 根据S37赛季评分机制
        function evaluatePerformance() {
            // 获取输入值
            const position = document.getElementById('position').value;
            const kills = parseInt(document.getElementById('kills').value) || 0;
            const deaths = parseInt(document.getElementById('deaths').value) || 0;
            const assists = parseInt(document.getElementById('assists').value) || 0;
            const damageShare = parseFloat(document.getElementById('damageShare').value) || 0;
            const damageTaken = parseFloat(document.getElementById('damageTaken').value) || 0;
            const teamFight = parseFloat(document.getElementById('teamFight').value) || 0;
            const goldShare = parseFloat(document.getElementById('goldShare').value) || 0;

            // KDA计算
            const kda = deaths === 0 ? (kills + assists) : ((kills + assists) / deaths);

            // 基础评分（0-10分）
            let baseScore = 0;

            // KDA贡献（最高约3分）
            baseScore += Math.min(3, kda * 0.6);

            // 根据位置计算各项权重
            let weights = {
                damageShare: 0,
                damageTaken: 0,
                teamFight: 0,
                goldShare: 0,
                kills: 0
            };

            // 不同位置的权重配置
            switch (position) {
                case 'marksman':  // 射手 - 重点看伤害输出
                    weights.damageShare = 2.5;
                    weights.teamFight = 1.0;
                    weights.goldShare = 0.8;
                    weights.kills = 1.2;
                    break;
                case 'mage':  // 法师 - 伤害+参团
                    weights.damageShare = 2.2;
                    weights.teamFight = 1.2;
                    weights.goldShare = 0.6;
                    weights.kills = 1.0;
                    break;
                case 'tank':  // 坦克/对抗路 - 重点看承受伤害
                    weights.damageTaken = 2.5;
                    weights.teamFight = 1.5;
                    weights.damageShare = 0.8;
                    weights.goldShare = 0.5;
                    break;
                case 'support':  // 辅助 - 重点看参团率
                    weights.teamFight = 2.8;
                    weights.assists = 1.5;
                    weights.damageTaken = 0.8;
                    weights.goldShare = 0.3;
                    break;
                case 'jungler':  // 打野 - 经济与击杀
                    weights.goldShare = 2.0;
                    weights.kills = 1.8;
                    weights.damageShare = 1.0;
                    weights.teamFight = 1.0;
                    break;
            }

            // 计算各项得分
            const damageScore = Math.min(weights.damageShare, damageShare / 20 * weights.damageShare);
            const takenScore = Math.min(weights.damageTaken, damageTaken / 20 * weights.damageTaken);
            const teamScore = Math.min(weights.teamFight, teamFight / 20 * weights.teamFight);
            const goldScore = Math.min(weights.goldShare, goldShare / 20 * weights.goldShare);
            const killScore = Math.min(weights.kills, kills * 0.3 * weights.kills);

            // 汇总基础分（满分约10分）
            baseScore = Math.min(10, damageScore + takenScore + teamScore + goldScore + killScore + (kills + assists) * 0.15);

            // 死亡惩罚
            if (deaths > 5) {
                baseScore -= (deaths - 5) * 0.2;
            }

            // MVP指数计算（考虑团队中最佳表现）
            let mvpIndex = baseScore;
            // 模拟团队对比：MVP需要明显高于平均水平
            const teamAvg = 5.5 + Math.random() * 1.5; // 假设团队平均5.5-7分
            const mvpThreshold = teamAvg + 2.5;

            // 金牌指数（最高12分，S37赛季金牌线约11.5分）
            let goldIndex = baseScore + 2;
            // 银牌线约9分
            const silverThreshold = 9;
            const goldThreshold = 11.5;

            // 计算最终评分
            const finalScore = Math.max(0, Math.min(12, baseScore + 1.5));

            // 判断获得哪个牌子
            let hasGold = false, hasSilver = false, hasMvp = false;

            if (finalScore >= goldThreshold) {
                hasGold = true;
            }
            if (finalScore >= silverThreshold && !hasGold) {
                hasSilver = true;
            }
            if (mvpIndex >= mvpThreshold) {
                hasMvp = true;
            }

            // MVP几率评估
            let mvpChance = '低';
            let mvpChancePercent = 0;
            if (hasMvp) {
                mvpChance = '高';
                mvpChancePercent = 85;
            } else if (mvpIndex >= mvpThreshold - 1) {
                mvpChance = '中';
                mvpChancePercent = 45;
            } else {
                mvpChancePercent = Math.max(5, (mvpIndex / mvpThreshold) * 30);
            }

            // 生成分析文本
            let analysisText = generateAnalysis(position, finalScore, kills, deaths, assists,
                damageShare, damageTaken, teamFight, goldShare, hasMvp, mvpIndex, mvpThreshold);

            // 更新UI
            updateUI(finalScore, mvpIndex, goldIndex, hasGold, hasSilver, hasMvp,
                mvpChance, mvpChancePercent, analysisText);
        }

        // 生成分析文本
        function generateAnalysis(position, score, kills, deaths, assists,
            damageShare, damageTaken, teamFight, goldShare, hasMvp, mvpIndex, mvpThreshold) {
            let analysis = '';
            let strengths = [];
            let weaknesses = [];
            let positionName = {
                'marksman': '射手',
                'mage': '法师',
                'tank': '坦克/对抗路',
                'support': '辅助',
                'jungler': '打野'
            }[position];

            // 分析优势
            if (kills >= 8) strengths.push('击杀数较高');
            if (assists >= 10) strengths.push('助攻表现优秀');
            if (deaths <= 3) strengths.push('生存能力很强');
            if (damageShare >= 25) strengths.push('输出占比很高');
            if (damageTaken >= 30) strengths.push('为团队承受了大量伤害');
            if (teamFight >= 70) strengths.push('参团率非常高');
            if (goldShare >= 25) strengths.push('经济获取能力出色');

            // 分析劣势
            if (deaths >= 8) weaknesses.push('死亡次数偏多，需要注意生存');
            if (kills + assists < 5) weaknesses.push('参与击杀较少');
            if (teamFight < 50 && position === 'support') weaknesses.push('辅助参团率偏低');
            if (damageShare < 15 && (position === 'marksman' || position === 'mage'))
                weaknesses.push('输出占比较低，需要提高伤害');

            // 生成结果文本
            if (hasMvp) {
                analysis = `<span class="highlight">恭喜！</span>你的表现非常出色，综合评分达到 ${score.toFixed(1)} 分，`;
                analysis += `非常有机会获得MVP！`;
                if (strengths.length > 0) {
                    analysis += `<br><br>你的亮点：${strengths.join('、')}`;
                }
            } else if (score >= 11.5) {
                analysis = `你的表现非常优秀，综合评分 <span class="highlight">${score.toFixed(1)} 分</span>，`;
                analysis += `金牌稳了！但与MVP相比，还需加强：`;
                if (weaknesses.length > 0) {
                    analysis += `<br><br>需要改进：${weaknesses.join('、')}`;
                }
                analysis += `<br><br>MVP冲刺建议：${getMvpTips(position)}`;
            } else if (score >= 9) {
                analysis = `你的表现不错，综合评分 <span class="highlight">${score.toFixed(1)} 分</span>，`;
                analysis += `有机会获得银牌。`;
                if (weaknesses.length > 0) {
                    analysis += `<br><br>需要改进：${weaknesses.join('、')}`;
                }
                analysis += `<br><br>提升建议：${getMvpTips(position)}`;
            } else {
                analysis = `综合评分 <span class="highlight">${score.toFixed(1)} 分</span>，`;
                analysis += `本场表现还有提升空间。`;
                if (weaknesses.length > 0) {
                    analysis += `<br><br>主要问题：${weaknesses.join('、')}`;
                }
                analysis += `<br><br>${positionName}位的提升建议：${getMvpTips(position)}`;
            }

            return analysis;
        }

        // 获取MVP冲刺建议
        function getMvpTips(position) {
            const tips = {
                'marksman': '提高输出占比，减少死亡，保持良好补兵节奏',
                'mage': '多参与团战，在保证生存的前提下提高技能命中率',
                'tank': '多开团、承伤的同时注意保护后排',
                'support': '提高参团率，多看小地图支援队友',
                'jungler': '带好节奏，多蹭线保证经济领先，主动发起小规模团战'
            };
            return tips[position];
        }

        // 更新UI显示
        function updateUI(finalScore, mvpIndex, goldIndex, hasGold, hasSilver, hasMvp,
            mvpChance, mvpChancePercent, analysisText) {
            // 显示结果区域
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.classList.add('show');

            // 更新牌子显示
            const mvpBadge = document.getElementById('mvpBadge');
            const goldBadge = document.getElementById('goldBadge');
            const silverBadge = document.getElementById('silverBadge');

            mvpBadge.classList.toggle('won', hasMvp);
            goldBadge.classList.toggle('won', hasGold);
            silverBadge.classList.toggle('won', hasSilver);

            // 更新评分
            document.getElementById('finalScore').textContent = finalScore.toFixed(1);
            document.getElementById('mvpIndex').textContent = mvpIndex.toFixed(1);
            document.getElementById('goldIndex').textContent = Math.min(12, goldIndex).toFixed(1);

            // 设置评分颜色
            setScoreColor('mvpIndex', mvpIndex);
            setScoreColor('goldIndex', goldIndex);

            // 更新分析文本
            document.getElementById('analysisText').innerHTML = analysisText;

            // 滚动到结果区域
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 设置分数颜色
        function setScoreColor(elementId, score) {
            const element = document.getElementById(elementId);
            element.classList.remove('high', 'medium', 'low');
            if (score >= 10) {
                element.classList.add('high');
            } else if (score >= 7) {
                element.classList.add('medium');
            } else {
                element.classList.add('low');
            }
        }

        // 回车键快捷评估
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                evaluatePerformance();
            }
        });
    </script>
</body>
</html>
